[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-trainer"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.3",
    "gymnasium>=0.29",
    "requests>=2.32",
    "numpy>=1.26",
    "typer>=0.12",
]

[project.optional-dependencies]
dev = ["pytest>=8", "black", "ruff"]

[project.scripts]
train = "ai_trainer.train:app"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_trainer"]
