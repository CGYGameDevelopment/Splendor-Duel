[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ai-trainer"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.11.0,<3.0",
    "gymnasium>=1.2.3,<2.0",
    "requests>=2.33.1,<3.0",
    "numpy>=2.4.4,<3.0",
    "typer>=0.24.1,<1.0",
    "websockets>=16.0,<17.0",
]

[project.optional-dependencies]
dev = ["pytest>=9.0.3,<10", "black>=26.3.1", "ruff>=0.15.10"]

[project.scripts]
train = "ai_trainer.train:app"
play-vs-ai = "ai_trainer.bot_client:app"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_trainer"]
